name: Python App Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tech_teacher_phone

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Start app
        run: |
          python app.py &
          sleep 3

      - name: Check homepage
        run: |
          python - <<'PY'
          import urllib.request
          url = "http://127.0.0.1:8000"
          with urllib.request.urlopen(url, timeout=10) as r:
              print("STATUS:", r.status)
              assert r.status == 200
          PY
